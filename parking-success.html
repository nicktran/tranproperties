  <meta charset="UTF-8" />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --white: #ffffff; --page: #f8f7f5; --border: #e5e3df; --border-mid: #ccc9c4;
      --text: #1a1a1a; --text-2: #6b6866; --accent: #b05c3a; --accent-h: #8c4830;
      --success: #2e7d52; --radius: 10px; --radius-lg: 14px;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: var(--page); color: var(--text); line-height: 1.6; font-size: 15px; -webkit-font-smoothing: antialiased; }
    nav { position: sticky; top: 0; z-index: 100; background: var(--white); border-bottom: 1px solid var(--border); padding: 0 48px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 9px; text-decoration: none; }
    .logo-mark { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .logo-mark svg { width: 14px; height: 14px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .logo-text { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
    .nav-links { display: flex; align-items: center; gap: 28px; list-style: none; }
    .nav-links a { color: var(--text-2); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.15s; }
    .nav-links a:hover { color: var(--text); }
    .wrap { background: var(--white); border-top: 1px solid var(--border); min-height: calc(100vh - 60px); display: flex; align-items: center; justify-content: center; }
    .inner { max-width: 480px; width: 100%; padding: 72px 48px; text-align: center; }
    .success-icon { width: 56px; height: 56px; background: #e8f5ee; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; }
    .success-icon svg { width: 24px; height: 24px; stroke: var(--success); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    h1 { font-size: 1.4rem; font-weight: 600; color: var(--text); margin-bottom: 10px; }
    p { font-size: 14px; color: var(--text-2); line-height: 1.7; margin-bottom: 24px; }
    .detail { background: var(--page); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; text-align: left; margin-bottom: 24px; }
    .detail-row { display: flex; gap: 10px; font-size: 13px; padding: 5px 0; color: var(--text-2); }
    .detail-row + .detail-row { border-top: 1px solid var(--border); }
    .btn { display: inline-block; padding: 11px 22px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.15s; border: none; font-family: 'Inter', sans-serif; background: transparent; color: var(--text-2); border: 1px solid var(--border-mid); }
    .btn:hover { color: var(--text); border-color: var(--text-2); background: var(--white); }
    footer { background: #1a1a1a; color: #a09e9b; padding: 40px 48px; font-size: 13px; text-align: center; }
    footer a { color: #a09e9b; text-decoration: none; }
    footer a:hover { color: #fff; }
    @media (max-width: 600px) { nav { padding: 0 16px; } .inner { padding: 40px 16px; } footer { padding: 32px 16px; } }
  </style>
</head>
<body>
<script>if (!window.__isDeveloperTraffic) {document.write('<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WHL6QD5R" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>');}</script>

<nav>
  <a href="/" class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
    </div>
    <span class="logo-text">Tran Properties</span>
  </a>
  <ul class="nav-links">
    <li><a href="/">← Back to listings</a></li>
  </ul>
</nav>

<div class="wrap">
  <div class="inner">
    <div class="success-icon">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1>Application submitted</h1>
    <p>We've received your parking application and will be in touch within 1–2 business days.</p>
    <div class="detail" id="detail-box">
      <div class="detail-row">👤 <span id="s-name"></span></div>
      <div class="detail-row">📧 <span id="s-email"></span></div>
      <div class="detail-row">📅 <span id="s-dates"></span></div>
    </div>
    <a href="/" class="btn">← Back to listings</a>
  </div>
</div>

<footer>
  <p>© 2025 Tran Properties · <a href="/">tranproperties.com</a> · <a href="mailto:nicktran@nicktran.com">nicktran@nicktran.com</a></p>
</footer>

<script>
  const stored = JSON.parse(sessionStorage.getItem('parking-submission') || '{}');
  if (stored.name)  document.getElementById('s-name').textContent  = stored.name;
  if (stored.email) document.getElementById('s-email').textContent = stored.email;
  if (stored.dates) document.getElementById('s-dates').textContent = stored.dates;
  if (!stored.name && !stored.email && !stored.dates) {
    document.getElementById('detail-box').style.display = 'none';
  }
  sessionStorage.removeItem('parking-submission');
</script>
</body>
</html>
